version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: soil_microbiome
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  ml-engine:
    build: ./ml-engine
    ports:
      - "8000:8000"
    volumes:
      - ./ml-engine/data:/app/data
      - ./ml-engine/model/artifacts:/app/model/artifacts
    environment:
      AUTO_TRAIN_ON_STARTUP: "true"
      ML_ENGINE_API_KEY: ${ML_ENGINE_API_KEY:-ml-internal-key-change-in-production}
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build: ./server
    ports:
      - "5000:5000"
    volumes:
      - ./server/uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/soil_microbiome
      ML_ENGINE_URL: http://ml-engine:8000
      JWT_SECRET: change_this_secret_in_production_minimum_32_chars
      ML_ENGINE_API_KEY: ${ML_ENGINE_API_KEY:-ml-internal-key-change-in-production}
      CLIENT_URL: http://localhost:3000
      PORT: 5000
      NODE_ENV: production
      DEVICE_INGEST_SECRET: ${DEVICE_INGEST_SECRET:-device-ingest-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      ml-engine:
        condition: service_started

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000
        VITE_SOCKET_URL: http://localhost:5000
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  postgres_data:
